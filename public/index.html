<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>合同审查助手</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>合同审查助手（Word 批注版）</h1>
      <p>上传 .docx 合同文件，系统会生成一个带批注的审查版合同，便于你在 Word 中直接查看和修改。</p>

      <section class="card">
        <h2>1. 上传合同（.docx）</h2>
        <input id="docxFile" type="file" accept=".docx,application/vnd.openxmlformats-officedocument.wordprocessingml.document" />
        <button id="reviewBtn">开始审查</button>
        <pre id="status">尚未上传</pre>
      </section>

      <section class="card">
        <h2>2. 审查结果</h2>
        <a id="downloadLink" class="download-link hidden" download>下载审查后的合同</a>
        <pre id="issues">等待审查...</pre>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
