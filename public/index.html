<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>法条 PDF 问答示例</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>法条 PDF 问答示例</h1>
      <p>先上传 PDF（法条文件），再输入法律问题，系统会调用 NotebookLM API 返回相关法条原文。</p>

      <section class="card">
        <h2>1. 上传法条 PDF</h2>
        <input id="pdfFile" type="file" accept="application/pdf" />
        <button id="uploadBtn">上传并建会话</button>
        <pre id="uploadStatus">尚未上传</pre>
      </section>

      <section class="card">
        <h2>2. 提问法律问题</h2>
        <textarea id="question" placeholder="例如：合同违约责任在法条中如何规定？"></textarea>
        <button id="askBtn">提问</button>
        <pre id="answer">等待提问...</pre>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
